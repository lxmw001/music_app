name: music_app
description: A Flutter music streaming application

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  audioplayers: ^5.2.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.0
  flutter_launcher_icons: ^0.14.4
  youtube_explode_dart: ^3.0.5
  dio: ^5.4.0
  audio_service: ^0.18.18
  just_audio: ^0.10.0
  just_audio_media_kit: ^2.0.0
  media_kit_libs_android_audio: ^1.3.0
  path_provider: ^2.1.0
  connectivity_plus: ^6.0.3
  url_launcher: ^6.2.0
  flutter_localizations:
    sdk: flutter
  intl: any
  palette_generator: ^0.3.3
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  generate: true
